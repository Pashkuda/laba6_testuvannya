name: Automated Testing & SAST (Ed25519)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  run-tests:
    # Завдання 10: Автоматизований запуск тестів 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Pytest with Coverage
        run: |
          python -m pytest --cov=ed25519_logic test_main.py

  sast-scan:
    # Завдання 11: Статичне тестування безпеки (SAST) 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bandit
        # Вибір засобу SAST за власним вподобанням 
        run: pip install bandit

      - name: Run Bandit Scan
        run: bandit -r . -v