name: Lab6_Final_CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Tests
        run: python -m pytest --cov=ed25519_logic test_main.py

      - name: Send POST Request Notification
        # Вебхук
        run: |
          curl -X POST https://httpbin.org/post \
          -H "Content-Type: application/json" \
          -d '{"student": "Ihor Tokmenko", "lab": "6", "status": "Success", "message": "All tests passed!"}'

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Bandit
        run: pip install bandit
        
      - name: Run SAST Scan
        run: bandit -r . -v
        continue-on-error: true